llm: "!include ${LLM_CONFIG:-../llm/openai.yaml}"
runtime:
  backend: docker
  timeout: 14400
  resource_limits:
    cpu: "4"
    memory: "8Gi"
agent:
  type: search_swe
  max_steps: 100
  enable_search: false
  bash_timeout: 1200
  tool_call_format: openai_function
task:
  type: scale_swe
  dataset_id: scale_swe
  data_file: ${DATA_FILE}
eval:
  enabled: true
  timeout: 3600
execution:
  max_concurrent: 50
  max_retries: 3
  output_path: ./results/scale_swe
